name: Build and Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  GO_VERSION: '1.21'

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/config-pilot-${{ matrix.suffix }}${{ matrix.goos == 'windows' && '.exe' || '' }} ./cmd/monitor

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: config-pilot-${{ matrix.suffix }}
          path: dist/config-pilot-${{ matrix.suffix }}${{ matrix.goos == 'windows' && '.exe' || '' }}

  build-deb:
    name: Build .deb packages
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper

      - name: Build binary for deb package
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p build/usr/bin
          go build -ldflags="-s -w" -o build/usr/bin/config-pilot ./cmd/monitor

      - name: Create package structure
        run: |
          mkdir -p build/etc/config-pilot
          mkdir -p build/lib/systemd/system
          mkdir -p build/DEBIAN

      - name: Copy config files
        run: |
          cp config.yaml.sample build/etc/config-pilot/config.yaml

      - name: Create systemd service
        run: |
          cat > build/lib/systemd/system/config-pilot.service << 'EOF'
          [Unit]
          Description=Config Pilot Service
          After=network.target

          [Service]
          Type=simple
          User=root
          Group=root
          ExecStart=/usr/bin/config-pilot
          Restart=always
          RestartSec=10
          Environment=CONFIG_FILE=/etc/config-pilot/config.yaml
          Environment=LOG_LEVEL=info

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create postinst script
        run: |
          cat > build/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e

          # Create log directory
          mkdir -p /var/log/config-pilot

          # Enable and start service
          systemctl daemon-reload
          systemctl enable config-pilot.service

          # Don't start automatically on install, let user decide
          # systemctl start config-pilot.service

          exit 0
          EOF

      - name: Create prerm script
        run: |
          cat > build/DEBIAN/prerm << 'EOF'
          #!/bin/bash
          set -e

          # Stop service
          systemctl stop config-pilot.service || true
          systemctl disable config-pilot.service || true

          exit 0
          EOF

      - name: Create control file
        run: |
          cat > build/DEBIAN/control << EOF
          Package: config-pilot
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: ${{ matrix.arch }}
          Depends: systemd
          Maintainer: Config Pilot Team
          Description: |
            Config Pilot - Configuration management and monitoring service
            Config Pilot is a service that monitors configuration changes and provides automated deployment capabilities.
          EOF

      - name: Set permissions
        run: |
          chmod +x build/DEBIAN/postinst
          chmod +x build/DEBIAN/prerm
          chmod 755 build/usr/bin/config-pilot

      - name: Build .deb package
        run: |
          ls -la
          dpkg-deb --build build config-pilot-${{ matrix.arch }}.deb
          ls -la

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-pilot-${{ matrix.arch }}
          path: config-pilot-${{ matrix.arch }}.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-deb]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: check
        run: ls -la

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: check
        run: ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: |
            artifacts/config-pilot-linux-amd64/config-pilot-linux-amd64
            artifacts/config-pilot-linux-arm64/config-pilot-linux-arm64
            artifacts/config-pilot-darwin-amd64/config-pilot-darwin-amd64
            artifacts/config-pilot-darwin-arm64/config-pilot-darwin-arm64
            artifacts/config-pilot-deb-amd64/config-pilot-*.deb
            artifacts/config-pilot-deb-arm64/config-pilot-*.deb
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
